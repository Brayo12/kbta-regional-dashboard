<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBTA Regional Programme Dashboard 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>

:root{
  --navy:#14213D; --navy-2:#1F3A5F; --gold:#F5A623; --gold-2:#F5C018;
  --bg:#F1F3F4; --surface:#FFFFFF; --line:#E0E3E7;
  --text:#202124; --muted:#5F6368; --ok:#188038; --warn:#C5221F;
  --teal:#12758C; --purple:#7B61A8; --red:#C5221F; --grey:#9AA0A6;
  --shadow:0 1px 2px rgba(60,64,67,.12),0 1px 3px 1px rgba(60,64,67,.08);
  --radius:12px; --font-h:'Google Sans','Roboto',sans-serif; --font-b:'Roboto',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);font-size:14px}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}

/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
.sidebar{width:264px;background:var(--surface);border-right:1px solid var(--line);position:fixed;inset:0 auto 0 0;z-index:60;display:flex;flex-direction:column;transition:transform .25s ease}
.main{flex:1;margin-left:264px;display:flex;flex-direction:column;min-width:0}
@media(max-width:1024px){
  .sidebar{transform:translateX(-100%)} .sidebar.open{transform:none;box-shadow:0 0 0 100vmax rgba(0,0,0,.35)}
  .main{margin-left:0}
}

/* ===== Sidebar ===== */
.brand{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
.brand-badge{width:40px;height:40px;border-radius:10px;background:var(--navy);color:var(--gold-2);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-weight:700;font-size:15px;letter-spacing:.5px}
.brand h1{font-family:var(--font-h);font-size:15px;font-weight:500;color:var(--navy);line-height:1.25}
.brand span{display:block;font-size:11px;color:var(--muted);font-weight:400}
.nav{flex:1;overflow-y:auto;padding:10px 12px 24px}
.nav-label{font-size:11px;font-weight:500;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;padding:16px 12px 6px}
.nav-item{display:flex;align-items:center;gap:12px;width:100%;border:0;background:none;cursor:pointer;padding:9px 12px;border-radius:24px;font-family:var(--font-b);font-size:13.5px;color:var(--text);text-align:left;transition:background .15s}
.nav-item:hover{background:#F1F3F4}
.nav-item:focus-visible{outline:2px solid var(--navy);outline-offset:2px}
.nav-item.active{background:#E8EDF6;color:var(--navy);font-weight:500}
.nav-item .material-symbols-outlined{font-size:20px;color:var(--muted)}
.nav-item.active .material-symbols-outlined{color:var(--navy)}
.nav-flag{width:20px;height:14px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 1px rgba(0,0,0,.08)}
.sidebar-foot{padding:12px 20px;border-top:1px solid var(--line);font-size:11px;color:var(--muted)}

/* ===== Top bar ===== */
.topbar{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--line);padding:10px 24px;display:flex;align-items:center;gap:14px}
.menu-btn{display:none;border:0;background:none;cursor:pointer;padding:6px;border-radius:50%}
.menu-btn:hover{background:#F1F3F4}
@media(max-width:1024px){.menu-btn{display:inline-flex}}
.crumbs{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.crumbs .sep{color:#B9BDC2}
.crumbs .here{color:var(--text);font-weight:500}
.topbar .spacer{flex:1}
.chip{display:inline-flex;align-items:center;gap:6px;background:#E8EDF6;color:var(--navy);border-radius:16px;padding:5px 12px;font-size:12px;font-weight:500;white-space:nowrap}
.chip .dot{width:8px;height:8px;border-radius:50%;background:var(--ok)}
.chip.warn{background:#FCE8E6;color:var(--warn)}
.chip.warn .dot{background:var(--warn)}
.refresh-btn{border:1px solid var(--line);background:var(--surface);border-radius:16px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;color:var(--navy);display:inline-flex;align-items:center;gap:6px}
.refresh-btn:hover{background:#F1F3F4}
.refresh-btn .material-symbols-outlined{font-size:16px}

/* ===== Page ===== */
.page{display:none;padding:22px 24px 48px;max-width:1440px;width:100%;margin:0 auto}
.page.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.page-head{margin-bottom:18px}
.page-head h2{font-family:var(--font-h);font-size:22px;font-weight:500;color:var(--navy);display:flex;align-items:center;gap:10px}
.page-head p{color:var(--muted);font-size:13px;margin-top:4px;max-width:840px}
.page-flag{width:34px;height:24px;border-radius:4px;object-fit:cover;box-shadow:var(--shadow)}

/* ===== Cards & grids ===== */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:14px;margin-bottom:18px}
.kpi{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;display:flex;gap:14px;align-items:center;min-width:0}
.kpi-ic{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:none}
.kpi-ic .material-symbols-outlined{font-size:22px}
.ic-gold{background:#FDF3DC;color:#B07B0A}.ic-navy{background:#E8EDF6;color:var(--navy)}
.ic-teal{background:#E0F1F5;color:var(--teal)}.ic-green{background:#E6F4EA;color:var(--ok)}
.ic-purple{background:#F0EBF8;color:var(--purple)}.ic-red{background:#FCE8E6;color:var(--warn)}
.kpi b{display:block;font-family:var(--font-h);font-size:22px;font-weight:500;color:var(--text);line-height:1.15}
.kpi span{font-size:12px;color:var(--muted)}
.grid{display:grid;gap:16px;margin-bottom:16px}
.g2{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;min-width:0}
.card h3{font-family:var(--font-h);font-size:14.5px;font-weight:500;color:var(--text);margin-bottom:2px}
.card .sub{font-size:12px;color:var(--muted);margin-bottom:12px}
.chart-wrap{position:relative;height:280px}
.chart-tall{height:340px}

/* Country cards */
.cc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(196px,1fr));gap:14px;margin-bottom:18px}
.cc{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:flex;gap:12px;align-items:center;cursor:pointer;border:1px solid transparent;transition:border .15s, transform .15s}
.cc:hover{border-color:var(--gold);transform:translateY(-2px)}
.cc img{width:44px;height:31px;border-radius:4px;object-fit:cover;box-shadow:var(--shadow)}
.cc b{font-family:var(--font-h);font-size:14px;font-weight:500;color:var(--navy);display:block}
.cc span{font-size:11.5px;color:var(--muted);display:block;margin-top:2px}
.cc .arrow{margin-left:auto;color:var(--grey)}

/* ===== Tables ===== */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:7px 14px;min-width:230px;flex:1;max-width:360px}
.search input{border:0;outline:0;font-family:var(--font-b);font-size:13px;width:100%;background:none}
.search .material-symbols-outlined{font-size:18px;color:var(--muted)}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{border:1px solid var(--line);background:var(--surface);border-radius:16px;padding:6px 14px;font-size:12.5px;cursor:pointer;color:var(--text);font-family:var(--font-b)}
.pill.active{background:var(--navy);border-color:var(--navy);color:#fff}
.tbl-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
th{position:sticky;top:0;background:#F8F9FA;text-align:left;font-weight:500;color:var(--muted);font-size:12px;padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
th .material-symbols-outlined{font-size:14px;opacity:.55}
td{padding:10px 14px;border-bottom:1px solid #F1F3F4;vertical-align:middle}
tr:hover td{background:#FAFBFC}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11.5px;font-weight:500}
.b-navy{background:#E8EDF6;color:var(--navy)}.b-gold{background:#FDF3DC;color:#8F6400}
.b-green{background:#E6F4EA;color:var(--ok)}.b-grey{background:#F1F3F4;color:var(--muted)}
.b-red{background:#FCE8E6;color:var(--warn)}.b-teal{background:#E0F1F5;color:var(--teal)}
.tbl-foot{padding:10px 16px;font-size:12px;color:var(--muted);border-top:1px solid var(--line)}
.flag-cell{display:flex;align-items:center;gap:8px}
.flag-cell img{width:22px;height:15px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 1px rgba(0,0,0,.08)}

/* Map */
#mapEl{height:560px;border-radius:var(--radius);z-index:1}
.leaflet-popup-content{font-family:var(--font-b)}

/* Contacts gate */
.gate{max-width:420px;margin:8vh auto;text-align:center}
.gate .material-symbols-outlined{font-size:44px;color:var(--gold)}
.gate h3{font-family:var(--font-h);font-size:18px;color:var(--navy);margin:12px 0 6px}
.gate p{color:var(--muted);font-size:13px;margin-bottom:16px}
.gate input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:8px;font-size:16px;text-align:center;letter-spacing:6px;font-family:var(--font-h)}
.gate button{margin-top:12px;width:100%;padding:12px;border:0;border-radius:24px;background:var(--navy);color:#fff;font-family:var(--font-h);font-size:14px;cursor:pointer}
.gate button:hover{background:var(--navy-2)}
.gate .err{color:var(--warn);font-size:12px;margin-top:8px;display:none}

.boot-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--muted);font-family:var(--font-h)}
.boot-screen .material-symbols-outlined{font-size:40px;color:var(--gold)}

@media(max-width:640px){
  .page{padding:16px 14px 40px}
  .chart-wrap{height:240px}
  .kpi b{font-size:19px}
}

.refresh-btn.spin .material-symbols-outlined{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>

<script>
/* ============================================================
   KBTA REGIONAL PROGRAMME DASHBOARD — live data edition
   Data source order: 1) API_URL (Apps Script Web App JSON)
                       2) localStorage cache (last successful fetch)
                       3) embedded SEED_DATA (bundled snapshot)
   ============================================================ */

// >>> CONFIGURE THIS: paste your deployed Apps Script Web App /exec URL here.
// Leave blank ('') to run the dashboard on the bundled seed snapshot only.
const API_URL = "https://script.google.com/macros/s/AKfycbwmDz-QGZWXr6uSvvCM2KrTXW1swu4r-FSVprPEFILu_DEuTS8N7q-oph2T_QAxCFK5/exec";

const CACHE_KEY = "kbta_dashboard_cache_v1";
const CACHE_TTL_MS = 1000 * 60 * 60 * 6; // 6 hours

const COUNTRY_META = {
  Kenya:    {lat:-1.286,  lng:36.82,  color:'#F5C018', code:'kenya'},
  Rwanda:   {lat:-1.954,  lng:30.06,  color:'#CC2200', code:'rwanda'},
  Malawi:   {lat:-13.962, lng:33.774, color:'#888888', code:'malawi'},
  Tanzania: {lat:-6.369,  lng:34.889, color:'#00b0cc', code:'tanzania'},
  Uganda:   {lat:0.348,   lng:32.583, color:'#6c3483', code:'uganda'},
};
const COUNTRIES = Object.keys(COUNTRY_META).map(n => [COUNTRY_META[n].code, n]);

const NAVY='#14213D', NAVY2='#1F3A5F', GOLD='#F5A623', GOLD2='#F5C018', TEAL='#12758C',
      PURPLE='#7B61A8', RED='#C5221F', GREEN='#188038', GREY='#9AA0A6';
const PAL=[GOLD,NAVY,TEAL,PURPLE,RED,GREEN,GREY,'#4C8BF5'];
const FLAG=c=>`https://flagcdn.com/w80/${({kenya:'ke',rwanda:'rw',malawi:'mw',tanzania:'tz',uganda:'ug'})[c]||'un'}.png`;
const fmt=n=>(n==null||n===''?'—':Number(n).toLocaleString());
Chart.defaults.font.family="'Roboto',sans-serif";
Chart.defaults.color='#5F6368';
Chart.defaults.plugins.legend.labels.boxWidth=12;

/* ---------- Data loading ---------- */
let DATA = null;      // {institutions, employability, donations, country_summary, contacts_pin, updated_at, source}
let INST = [];
let CD = {};

function readCache(){
  try{
    const raw = localStorage.getItem(CACHE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || !parsed.fetched_at) return null;
    return parsed;
  }catch(e){ return null; }
}
function writeCache(payload){
  try{ localStorage.setItem(CACHE_KEY, JSON.stringify({...payload, fetched_at: Date.now()})); }catch(e){}
}

async function loadData(){
  // 1) Try the live API
  if(API_URL){
    try{
      const res = await fetch(API_URL, {cache:'no-store'});
      if(res.ok){
        const json = await res.json();
        json.source = 'live';
        json.updated_at = json.updated_at || new Date().toISOString();
        writeCache(json);
        return json;
      }
    }catch(e){ /* fall through */ }
  }
  // 2) Fall back to cache if fresh-ish
  const cached = readCache();
  if(cached){ cached.source = 'cache'; return cached; }
  // 3) Fall back to bundled seed snapshot
  const seed = JSON.parse(JSON.stringify(SEED_DATA));
  seed.source = 'seed';
  seed.updated_at = seed.updated_at || 'bundled snapshot';
  return seed;
}

function computeCountrySummary(institutions){
  const byCountry = {};
  Object.keys(COUNTRY_META).forEach(n => byCountry[n] = {
    institutions:0, learners:0, or20:0, calcs:0, laptops:0, desktops:0, tablets:0,
    scanners:0, lego:0, hable:0, robotic:0, cb:0, maint:0,
    ...COUNTRY_META[n]
  });
  institutions.forEach(r=>{
    const n = r.country;
    if(!byCountry[n]) return;
    const b = byCountry[n];
    b.institutions++;
    b.learners += (+r.enrolment||0);
    b.or20 += (+r.device_or20||0);
    b.calcs += (+r.device_calculator||0);
    b.laptops += (+r.device_laptop||0);
    b.desktops += (+r.device_desktop||0);
    b.tablets += (+r.device_tablet||0);
    b.scanners += (+r.device_scanner||0);
    b.lego += (+r.device_lego_braille||0);
    b.hable += (+r.device_hable_one||0);
    b.robotic += (+r.device_robotics_kit||0);
    b.cb += (+r.staff_trained||0);
    b.maint += (+r.devices_serviced||0);
  });
  return byCountry;
}

function normalize(raw){
  // institutions -> INST rows keyed with country CODE (kenya/rwanda/...) for routing,
  // and country LABEL for display/aggregation lookups.
  const codeByLabel = {}; Object.entries(COUNTRY_META).forEach(([label,m])=>codeByLabel[label]=m.code);
  INST = (raw.institutions||[]).map(d=>({
    country: codeByLabel[d.country] || String(d.country||'').toLowerCase(),
    countryLabel: d.country,
    name: d.institution_name,
    region: [d.region, d.subregion].filter(Boolean).join(' / ') || '—',
    cat: d.category || '—',
    enrol: +d.enrolment||0,
    or20: +d.device_or20||0,
    laptops: +d.device_laptop||0,
    calc: +d.device_calculator||0,
    desktops: +d.device_desktop||0,
    tablets: +d.device_tablet||0,
    scanners: +d.device_scanner||0,
    lego: +d.device_lego_braille||0,
    hable: +d.device_hable_one||0,
    robotic: +d.device_robotics_kit||0,
    head: d.head_teacher_name, headP: d.head_teacher_phone,
    teacher: d.ict_braille_teacher_name, teacherP: d.ict_braille_teacher_phone,
    tech: d.technician_name, techP: d.technician_phone,
  }));

  // Country_summary: prefer server-computed (if provided & non-empty), else compute client-side.
  if(raw.country_summary && raw.country_summary.length){
    CD = {};
    raw.country_summary.forEach(r=>{
      const meta = COUNTRY_META[r.country] || {};
      CD[r.country] = {
        institutions: r.institutions ?? 0, learners: r.learners ?? 0, or20: r.or20 ?? 0,
        calcs: r.calcs ?? 0, laptops: r.laptops ?? 0, desktops: r.desktops ?? 0, tablets: r.tablets ?? 0,
        scanners: r.scanners ?? 0, lego: r.lego ?? 0, hable: r.hable ?? 0, robotic: r.robotic ?? 0,
        cb: r.cb ?? r.staff_trained ?? 0, maint: r.maint ?? r.devices_serviced ?? 0,
        lat: r.lat ?? meta.lat, lng: r.lng ?? meta.lng, color: r.color ?? meta.color,
      };
    });
  }else{
    CD = computeCountrySummary(raw.institutions||[]);
  }
  DATA = raw;
}

/* ---------- Page registry ---------- */
const PAGES=[

/* ---------- Shell ---------- */
const nav=document.getElementById('nav'), pagesEl=document.getElementById('pages');
function buildShell(){
  let currentSection='';
  PAGES.forEach(p=>{
    if(p.section!==currentSection){currentSection=p.section;nav.insertAdjacentHTML('beforeend',`<div class="nav-label">${p.section}</div>`);}
    nav.insertAdjacentHTML('beforeend',
      `<button class="nav-item" data-page="${p.id}" aria-label="${p.label}">`+
      (p.flag?`<img class="nav-flag" src="${FLAG(p.flag)}" alt="">`:`<span class="material-symbols-outlined">${p.icon}</span>`)+
      `${p.label}</button>`);
    pagesEl.insertAdjacentHTML('beforeend',`<main class="page" id="page-${p.id}" role="main"></main>`);
  });
}
const crumbs=document.getElementById('crumbs');
function show(id){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.page===id));
  document.querySelectorAll('.page').forEach(pg=>pg.classList.toggle('active',pg.id==='page-'+id));
  const p=PAGES.find(x=>x.id===id);
  crumbs.innerHTML=`<span>KBTA Regional Programme</span><span class="sep">/</span><span>${p.section}</span><span class="sep">/</span><span class="here">${p.label}</span>`;
  document.getElementById('sidebar').classList.remove('open');
  window.scrollTo({top:0});
  if(id==='map'&&!mapInit)initMap();
  try{history.replaceState(null,'','#'+id);}catch(e){}
}

function head(p,extra=''){
  return `<div class="page-head"><h2>${p.flag?`<img class="page-flag" src="${FLAG(p.flag)}" alt="">`:''}${p.label}</h2><p>${p.desc}</p>${extra}</div>`;
}
const kpi=(ic,cls,val,lab)=>`<div class="kpi"><div class="kpi-ic ${cls}"><span class="material-symbols-outlined">${ic}</span></div><div><b>${val}</b><span>${lab}</span></div></div>`;
const card=(title,sub,body,cls='')=>`<div class="card ${cls}"><h3>${title}</h3><div class="sub">${sub}</div>${body}</div>`;
const cw=(id,tall)=>`<div class="chart-wrap ${tall?'chart-tall':''}"><canvas id="${id}"></canvas></div>`;

const charts = {};
function destroyChart(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } }
function hbar(id,labels,data,color,label){destroyChart(id);charts[id]=new Chart(document.getElementById(id),{type:'bar',
 data:{labels,datasets:[{label,data,backgroundColor:color,borderRadius:4}]},
 options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#F1F3F4'}},y:{grid:{display:false},ticks:{font:{size:11}}}}}});}
function vbar(id,labels,datasets,stacked=false){destroyChart(id);charts[id]=new Chart(document.getElementById(id),{type:'bar',
 data:{labels,datasets:datasets.map((d,i)=>Object.assign({backgroundColor:PAL[i%PAL.length],borderRadius:4},d))},
 options:{responsive:true,maintainAspectRatio:false,scales:{x:{stacked,grid:{display:false}},y:{stacked,grid:{color:'#F1F3F4'}}},plugins:{legend:{display:datasets.length>1,position:'bottom'}}}});}
function donut(id,labels,data,colors){destroyChart(id);charts[id]=new Chart(document.getElementById(id),{type:'doughnut',
 data:{labels,datasets:[{data,backgroundColor:colors||PAL,borderWidth:2,borderColor:'#fff'}]},
 options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});}
function line(id,labels,datasets){destroyChart(id);charts[id]=new Chart(document.getElementById(id),{type:'line',
 data:{labels,datasets:datasets.map((d,i)=>Object.assign({borderColor:PAL[i%PAL.length],backgroundColor:PAL[i%PAL.length]+'22',tension:.3,fill:true,pointRadius:3},d))},
 options:{responsive:true,maintainAspectRatio:false,scales:{y:{grid:{color:'#F1F3F4'}},x:{grid:{display:false}}},plugins:{legend:{position:'bottom'}}}});}

/* Sortable + searchable table */
function makeTable(hostId,cols,rows,footNote){
  const host=document.getElementById(hostId);let sortI=-1,asc=true,q='';
  const render=()=>{
    let r=rows.filter(row=>!q||row.some(c=>String(c.v??c).toLowerCase().includes(q)));
    if(sortI>=0)r=[...r].sort((a,b)=>{const av=a[sortI].s??a[sortI].v??a[sortI],bv=b[sortI].s??b[sortI].v??b[sortI];
      return(typeof av==='number'?av-bv:String(av).localeCompare(String(bv)))*(asc?1:-1);});
    host.querySelector('tbody').innerHTML=r.map(row=>'<tr>'+row.map((c,i)=>`<td class="${cols[i].num?'num':''}">${c.h??c.v??c}</td>`).join('')+'</tr>').join('');
    host.querySelector('.tbl-foot').textContent=`${r.length} of ${rows.length} records${footNote?' · '+footNote:''}`;
  };
  host.innerHTML=`<div class="tbl-scroll"><table><thead><tr>${cols.map((c,i)=>`<th class="${c.num?'num':''}" data-i="${i}">${c.t} <span class="material-symbols-outlined">swap_vert</span></th>`).join('')}</tr></thead><tbody></tbody></table></div><div class="tbl-foot"></div>`;
  host.querySelectorAll('th').forEach(th=>th.onclick=()=>{const i=+th.dataset.i;asc=(sortI===i)?!asc:true;sortI=i;render();});
  render();
  return{search:s=>{q=s.toLowerCase();render();},refilter:f=>{rows=f;render();}};
}

  else { chip.className='chip warn'; label.textContent='Demo mode · bundled snapshot (no API configured)'; }
}

async function boot(){
  buildShell();
  nav.addEventListener('click',e=>{const b=e.target.closest('.nav-item');if(b)show(b.dataset.page);});
  document.getElementById('menuBtn').onclick=()=>document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('refreshBtn').onclick=async ()=>{
    document.getElementById('refreshBtn').classList.add('spin');
    const raw = await loadData();
    normalize(raw);
    renderAll();
    setStatusChip();
    if(mapInit) initMap();
    document.getElementById('refreshBtn').classList.remove('spin');
  };
  const raw = await loadData();
  normalize(raw);
  renderAll();
  setStatusChip();
  show(location.hash && PAGES.some(p=>'#'+p.id===location.hash) ? location.hash.slice(1) : 'overview');
}
boot();

</script>
</body>
</html>
